<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTac Duel Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>

    <!-- Header Navigation -->
    <header class="app-top-bar">
        <div id="user-profile-bar" class="profile-bar hidden">
            <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
            <div class="user-info">
                <span id="user-name-display" class="user-name-display">Player</span>
                <span id="user-stats-display" class="user-stats-display">Wins: 0</span>
            </div>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>

        <div class="header-right-controls">
            <button id="music-toggle-btn" class="icon-btn" title="Toggle Music">🎵</button>
            <button id="leaderboard-btn" class="icon-btn" title="Leaderboard">🏆</button>
        </div>
    </header>

    <!-- Audio Element -->
    <audio id="bg-music" loop src="bg-music.mp3"></audio>

    <!-- Main Game Container -->
    <main class="game-container">
        <section class="game-main-content">
            <div class="game-header">
                <h1><span class="wolf-icon">🐺</span> TicTac Duel</h1>
                <p id="status-text">Join or create a room to start!</p>
            </div>

            <div id="active-room-badge" class="active-room-badge hidden">
                <span id="game-room-code">ROOM: -----</span>
                <button id="copy-game-link" class="icon-link-btn" title="Copy Code">📋</button>
            </div>

            <div class="scoreboard">
                <div id="p1-box" class="player-box">
                    <span class="avatar">❌</span>
                    <span id="p1-name" class="player-name">Player 1</span>
                    <span id="p1-score" class="score">0</span>
                </div>
                <div class="vs-divider">VS</div>
                <div id="p2-box" class="player-box">
                    <span class="avatar">⭕</span>
                    <span id="p2-name" class="player-name">Player 2</span>
                    <span id="p2-score" class="score">0</span>
                </div>
            </div>

            <div class="board-wrapper">
                <div id="board" class="board disabled">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
            </div>

            <button id="toggle-chat-btn" class="mobile-chat-toggle">💬 Open Chat</button>

            <div class="game-action-buttons">
                <button id="rematch-btn" class="action-btn hidden">Play Again</button>
                <button id="leave-room-btn" class="action-btn accent hidden">Leave Room</button>
            </div>
        </section>

        <!-- Sidebar Chat -->
        <aside id="chat-box" class="chat-sidebar hidden">
            <div class="chat-header">
                <h3>Room Chat</h3>
                <button id="close-chat-btn" class="close-chat-btn">✕</button>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100" autocomplete="off">
                <button type="submit" class="chat-send-btn">Send</button>
            </form>
        </aside>
    </main>

    <!-- Overlay Lobby Popup -->
    <div id="join-overlay" class="overlay">
        <div class="overlay-card">
            <span class="brand-badge">🐺 TICTAC DUEL ARENA</span>
            <h2>Play TicTac Duel</h2>
            <p class="overlay-subtitle">Enter your name or sign in to sync stats</p>

            <div id="lobby-interactive-section" class="form-stack">
                <input type="text" id="username-input" placeholder="Enter Player Name..." maxlength="15">
                
                <button id="google-login-btn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                    Link Account with Google
                </button>

                <div class="or-divider"><span>GAME MODES</span></div>

                <div class="lobby-actions">
                    <button id="create-room-btn" class="overlay-btn primary">✨ Create New Room</button>
                    <div class="join-room-box">
                        <input type="text" id="room-code-input" placeholder="ROOM CODE..." maxlength="6">
                        <button id="join-code-btn" class="overlay-btn accent">Join</button>
                    </div>
                </div>
            </div>

            <div id="room-wait-box" class="room-wait-box hidden">
                <p class="wait-label">Share this code with your opponent:</p>
                <div id="room-code-display" class="room-code-text">------</div>
                <button id="copy-link-btn" class="overlay-btn primary">📋 Copy Room Code</button>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-card">
            <h2>🏆 Leaderboard</h2>
            <div id="leaderboard-list" class="leaderboard-list">Loading...</div>
            <button id="close-leaderboard-btn" class="overlay-btn primary">Close</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
