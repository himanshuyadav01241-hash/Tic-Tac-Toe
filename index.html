<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Duel — Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Falling Petals Background Canvas -->
    <div class="petal-container" id="petal-container"></div>

    <!-- Main Game Workspace Wrapper -->
    <main class="game-container">
        <header class="game-header">
            <h1>Sakura Duel</h1>
            <p id="status-text">Entering the sacred grounds...</p>
        </header>

        <!-- Dynamic Scoreboards -->
        <section class="scoreboard">
            <div class="player-box active-turn" id="p1-box">
                <span class="avatar">🌸</span>
                <span class="player-name" id="p1-name">Host</span>
                <div class="score" id="p1-score">0</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="player-box" id="p2-box">
                <span class="avatar">🦊</span>
                <span class="player-name" id="p2-name">Guest</span>
                <div class="score" id="p2-score">0</div>
            </div>
        </section>

        <!-- Interactive Duel Arena Matrix Grid -->
        <div class="board-wrapper">
            <div class="board disabled" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <!-- System Reset Interactive Button -->
        <button id="reset-btn" class="reset-button hidden">Next Round 🌸</button>
    </main>

    <!-- Structural Overlay Setup Screen Module Layer -->
    <div class="overlay" id="join-overlay">
        <div class="overlay-card">
            <h2 id="overlay-title">Sakura Duel</h2>
            <p id="overlay-subtitle" class="overlay-subtitle">Preparing the courtyard...</p>
            
            <div class="input-group">
                <label for="username-input">Enter Your Name</label>
                <input type="text" id="username-input" placeholder="Samurai..." maxlength="12" autocomplete="off">
            </div>

            <button id="overlay-btn" class="overlay-btn hidden">📋 Copy Invite Link</button>
        </div>
    </div>

    <!-- Active Real-Time JavaScript Core Engine Module Linking -->
    <script type="module" src="app.js"></script>
</body>
</html>
