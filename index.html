<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Duel 🌸</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body <!-- Add this right after the opening <body> tag -->
<div class="sakura-bg">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
</div>>

    <!-- Connection Overlay Screen with Name Inputs -->
    <div id="join-overlay" class="overlay">
        <div class="overlay-card">
            <span class="petal-loader">🌸</span>
            <h2 id="overlay-title">Preparing the Garden...</h2>
            <p id="overlay-subtitle">Gathering cherry blossoms...</p>
            
            <div class="input-group">
                <label for="username-input">Enter Your Name:</label>
                <input type="text" id="username-input" placeholder="Your Name" maxlength="12">
            </div>

            <button id="overlay-btn" class="hidden">📋 Copy Invite Link</button>
        </div>
    </div>

    <div class="glass-card">
        <h1 class="title">Sakura Duel</h1>
        
        <div id="status-panel" class="status-panel">
            <p id="status-text">Your Turn ✨</p>
        </div>

        <!-- Scoreboard showing Male & Female Characters -->
        <div class="scoreboard">
            <div class="score-box" id="p1-box">
                <div class="avatar character-male">🧑‍🦱</div>
                <span id="p1-name" class="player-name">Host</span>
                <span id="p1-score" class="score">0</span>
            </div>
            <div class="score-box" id="p2-box">
                <div class="avatar character-female">👩‍🦰</div>
                <span id="p2-name" class="player-name">Guest</span>
                <span id="p2-score" class="score">0</span>
            </div>
        </div>

        <div id="board" class="board disabled">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <button id="reset-btn" class="hidden">Play Again 🔄</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
